<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excluir Filme</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'filmes/style.css' %}">
</head>
<body>
    <div class="container">
        <h1>Excluir Filme</h1>

        <p>Tem certeza que deseja excluir o filme <strong>"{{ filme.titulo }}"</strong>?</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit">Sim, excluir</button>
        </form>

        <div class="acoes">
            <a href="{% url 'listar_filmes' %}">Cancelar</a>
        </div>
    </div>
</body>
</html>
