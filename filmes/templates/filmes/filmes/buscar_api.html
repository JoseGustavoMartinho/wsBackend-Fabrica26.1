<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Buscar Filme na API</title>
</head>
<body>
    <h1>Buscar Filme na OMDb</h1>

    <form method="post">
        {% csrf_token %}

        <label for="titulo">Título do filme:</label>
        <input type="text" name="titulo" id="titulo" required>

        <br><br>

        <label for="categoria">Categoria:</label>
        <select name="categoria" id="categoria" required>
            {% for categoria in categorias %}
                <option value="{{ categoria.id }}">{{ categoria.nome }}</option>
            {% endfor %}
        </select>

        <br><br>

        <button type="submit">Buscar e salvar</button>
    </form>

    {% if erro %}
        <p>{{ erro }}</p>
    {% endif %}

    <br>
    <a href="{% url 'listar_filmes' %}">Voltar</a>
</body>
</html>
