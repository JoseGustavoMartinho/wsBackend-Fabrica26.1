<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Deletar Filme</title>
</head>
<body>
    <h1>Confirmar exclusão</h1>

    <p>Deseja realmente deletar "{{ filme.titulo }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Sim, deletar</button>
    </form>

    <a href="{% url 'listar_filmes' %}">Cancelar</a>
</body>
</html>
