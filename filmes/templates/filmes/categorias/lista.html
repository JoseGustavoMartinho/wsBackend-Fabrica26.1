<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Categorias</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'filmes/style.css' %}">
</head>
<body>
    <div class="container">
        <h1>Lista de Categorias</h1>

        <div class="acoes">
            <a href="{% url 'criar_categoria' %}">Nova Categoria</a>
            <a href="{% url 'listar_filmes' %}">Voltar para Filmes</a>
        </div>

    <ul>
        {% for categoria in categorias %}
            <li>
                {{ categoria.nome }}
                <a href="{% url 'editar_categoria' categoria.id %}">Editar</a>
                <a href="{% url 'deletar_categoria' categoria.id %}">Deletar</a>
                <a href="{% url 'listar_filmes' %}">Voltar para Filmes</a>
            </li>
        {% empty %}
            <li>Nenhuma categoria cadastrada.</li>
        {% endfor %}
    </ul>
</body>
</html>
