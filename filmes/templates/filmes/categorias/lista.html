<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Categorias</title>
</head>
<body>
    <h1>Lista de Categorias</h1>

    <a href="{% url 'criar_categoria' %}">Nova Categoria</a>

    <ul>
        {% for categoria in categorias %}
            <li>
                {{ categoria.nome }}
                <a href="{% url 'editar_categoria' categoria.id %}">Editar</a>
                <a href="{% url 'deletar_categoria' categoria.id %}">Deletar</a>
            </li>
        {% empty %}
            <li>Nenhuma categoria cadastrada.</li>
        {% endfor %}
    </ul>
</body>
</html>
